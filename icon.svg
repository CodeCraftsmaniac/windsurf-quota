<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="25%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="75%" style="stop-color:#f778ba"/>
      <stop offset="100%" style="stop-color:#ff7b72"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#79c0ff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Ocean gradient ring -->
  <rect x="3" y="3" width="122" height="122" rx="25" fill="none" stroke="url(#ocean)" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner subtle ring -->
  <rect x="7" y="7" width="114" height="114" rx="21" fill="none" stroke="url(#ocean)" stroke-width="0.5" opacity="0.2"/>
  <!-- Bolt icon (compact, centered top) -->
  <path d="M64 10L50 42h14L48 72l30-38H62L74 10z" fill="url(#bolt)" filter="url(#glow)" opacity="0.95"/>
  <!-- Ocean wave -->
  <path d="M16 78 Q28 66 40 78 Q52 90 64 78 Q76 66 88 78 Q100 90 112 78" stroke="url(#ocean)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- "Windsurf" text -->
  <text x="64" y="98" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="800" fill="url(#textGrad)" text-anchor="middle" filter="url(#textGlow)" letter-spacing="1">WINDSURF</text>
  <!-- "Quota" text -->
  <text x="64" y="118" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="300" fill="#8b949e" text-anchor="middle" letter-spacing="4">QUOTA</text>
</svg>
